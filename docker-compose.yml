version: '3.8'

services:
  # FastAPI 后端 + 前端静态文件
  app:
    build: .
    container_name: langchain-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # 持久化向量数据库
      - ./chroma_db:/app/chroma_db
      # 持久化日志
      - ./logs:/app/logs
      # 挂载知识库数据（可选，如果需要动态更新）
      - ./data:/app/data:ro
    networks:
      - langchain-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: langchain-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      # SSL 证书（如果有）
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - langchain-net

networks:
  langchain-net:
    driver: bridge
