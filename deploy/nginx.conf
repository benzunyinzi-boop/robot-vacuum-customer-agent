# Nginx 配置 - 智扫通智能客服
# 路径：/etc/nginx/sites-available/langchain-agent

upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;  # 替换为你的域名，如：example.com

    # 日志
    access_log /var/log/nginx/langchain-agent-access.log;
    error_log /var/log/nginx/langchain-agent-error.log;

    # 客户端上传限制
    client_max_body_size 10M;

    # 前端静态文件
    location / {
        root /opt/langchain-react-agent/frontend/dist;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 代理到 FastAPI
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;

        # 保留原始请求信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应必需配置
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 超时设置（流式响应可能较长）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 健康检查
    location /api/v1/health {
        proxy_pass http://fastapi_backend;
        access_log off;
    }
}

